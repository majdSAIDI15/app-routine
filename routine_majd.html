<div id="app"></div>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --bg:#F3EFE6;
  --ink:#262220;
  --ink-soft:#5B5650;
  --card:#FFFFFF;
  --line:#E4DDCF;
  --ibadat:#4A4470;
  --sommeil:#1F2A44;
  --travail:#56626F;
  --sport:#B5502F;
  --nutrition:#A9862F;
  --etude:#2F6E68;
  --now-glow: 0 0 0 2px rgba(181,80,47,0.35), 0 8px 24px rgba(38,34,32,0.12);
}
*{box-sizing:border-box;}
#app{
  font-family:'Work Sans', sans-serif;
  color:var(--ink);
  background:var(--bg);
  padding:0;
  max-width:720px;
  margin:0 auto;
  line-height:1.4;
}
.header{
  padding:28px 22px 20px;
  border-bottom:1px solid var(--line);
}
.eyebrow{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-bottom:6px;
}
h1{
  font-family:'Fraunces', serif;
  font-weight:700;
  font-size:28px;
  margin:0 0 4px;
  letter-spacing:-0.01em;
}
.subline{
  font-size:14px;
  color:var(--ink-soft);
  margin-bottom:16px;
}
.badges{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
.badge{
  font-family:'IBM Plex Mono', monospace;
  font-size:11.5px;
  padding:5px 10px;
  border-radius:20px;
  background:var(--card);
  border:1px solid var(--line);
  color:var(--ink);
}
.badge.workout{background:var(--sport); color:#fff; border:none; font-weight:500;}
.progress-wrap{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px 14px;
}
.progress-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
.progress-label{font-size:12.5px; color:var(--ink-soft); font-weight:600;}
.progress-count{font-family:'IBM Plex Mono', monospace; font-size:13px;}
.bar-bg{height:8px; background:var(--line); border-radius:6px; overflow:hidden;}
.bar-fill{height:100%; background:linear-gradient(90deg, var(--sport), var(--nutrition)); transition:width .3s ease;}
.history{display:flex; gap:4px; margin-top:10px;}
.history .day{flex:1; height:22px; border-radius:4px; background:var(--line); position:relative;}
.history .day .fill{position:absolute; bottom:0; left:0; right:0; border-radius:4px; background:var(--etude);}
.history .lbl{font-family:'IBM Plex Mono', monospace; font-size:9px; text-align:center; color:var(--ink-soft); margin-top:3px;}

.timeline{position:relative; padding:20px 22px 40px 34px;}
.spine{
  position:absolute; left:20px; top:20px; bottom:40px; width:4px;
  border-radius:4px;
  background:linear-gradient(180deg,
    #1F2A44 0%, #E7A854 4%, #CFE0EA 10%, #F3EFE6 30%, #F3EFE6 60%,
    #C15B3E 82%, #3B3766 92%, #1F2A44 100%);
}
.now-dot{
  position:absolute; left:14px; width:16px; height:16px; border-radius:50%;
  background:var(--sport); border:3px solid var(--bg);
  box-shadow:0 0 0 2px var(--sport);
  transition:top .3s ease;
  z-index:5;
}

.block{
  position:relative;
  margin-left:22px;
  margin-bottom:14px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px 16px;
}
.block.current{box-shadow:var(--now-glow); border-color:var(--sport);}
.block-head{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px;}
.block-time{
  font-family:'IBM Plex Mono', monospace;
  font-size:12px;
  color:var(--ink-soft);
}
.block-title{
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size:16.5px;
}
.now-pill{
  font-family:'IBM Plex Mono', monospace;
  font-size:10px;
  letter-spacing:0.08em;
  background:var(--sport);
  color:#fff;
  padding:3px 8px;
  border-radius:20px;
  white-space:nowrap;
  text-transform:uppercase;
}
.item{
  display:flex; align-items:flex-start; gap:9px;
  padding:6px 0;
  font-size:14px;
}
.item + .item{border-top:1px dashed var(--line);}
.item input[type=checkbox]{
  margin-top:3px; width:16px; height:16px; flex-shrink:0; accent-color:var(--sport); cursor:pointer;
}
.item label{cursor:pointer; flex:1;}
.item.done label{color:var(--ink-soft); text-decoration:line-through;}
.tag{
  display:inline-block;
  font-family:'IBM Plex Mono', monospace;
  font-size:9.5px;
  padding:1px 6px;
  border-radius:4px;
  color:#fff;
  margin-left:8px;
  vertical-align:middle;
  text-transform:uppercase;
}
.variant-row{display:flex; gap:6px; margin-top:6px; margin-left:25px;}
.vbtn{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  padding:3px 9px;
  border-radius:20px;
  border:1px solid var(--line);
  background:var(--bg);
  cursor:pointer;
  color:var(--ink-soft);
}
.vbtn.active{background:var(--nutrition); color:#fff; border-color:var(--nutrition);}
.meta-note{font-size:12px; color:var(--ink-soft); margin-left:25px; margin-top:4px;}

.footer{
  padding:16px 22px 30px;
  border-top:1px solid var(--line);
}
.legend{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;}
.legend .chip{
  font-size:11px; padding:3px 9px; border-radius:20px; color:#fff;
  font-family:'IBM Plex Mono', monospace;
}
.note{
  font-size:12.5px; color:var(--ink-soft); background:var(--card);
  border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:12px;
}
.reset-btn{
  font-family:'Work Sans', sans-serif; font-size:13px; font-weight:600;
  padding:9px 16px; border-radius:8px; border:1px solid var(--line);
  background:var(--card); color:var(--ink); cursor:pointer;
}
.reset-btn:hover{border-color:var(--sport); color:var(--sport);}
</style>
<script>
(function(){

const TAGCOLOR = {
  ibadat: 'var(--ibadat)',
  sommeil: 'var(--sommeil)',
  travail: 'var(--travail)',
  sport: 'var(--sport)',
  nutrition: 'var(--nutrition)',
  etude: 'var(--etude)'
};
const TAGLABEL = {ibadat:'Ibadat', sommeil:'Sommeil', travail:'Stage', sport:'Sport', nutrition:'Nutrition', etude:'Étude'};

const WORKOUTS = {
  1:{name:'PUSH', detail:'Développé couché 4×8-10 · Militaire haltères 3×10-12 · Écarté 3×12 · Élévations lat. 3×15 · Ext. triceps 3×12'},
  2:{name:'PULL', detail:'Tirage vertical 4×8-10 · Rowing barre 4×8-10 · Tirage horizontal 3×12 · Curl barre 3×12 · Curl marteau 3×12'},
  3:{name:'LEGS', detail:'Squat/presse 4×8-10 · SDT roumain 4×8-10 · Fentes marchées 3×12/jbe · Leg curl 3×15 · Gainage 3×30-45s'},
  4:{name:'UPPER', detail:'Incliné haltères 3×10 · Rowing unilatéral 3×10 · Épaules machine 3×12 · Curl+ext superset 3×12'},
  5:{name:'LOWER', detail:'Presse/squat léger 3×12 · Fentes ou hip thrust 3×12 · Ext. quadriceps 3×15 · Mollets debout 4×15'},
  6:{name:'REPOS ACTIF', detail:'Pas de séance fixée — marche, mobilité, étirements si envie. Écoute le corps (voir vigilance surentraînement).'},
  0:{name:'REPOS', detail:'Repos complet. Le muscle grandit aussi les jours off.'}
};

const MEALDATA = {
  breakfast: {label:'Petit-déjeuner', options:{
    V1:{d:"3 œufs · 85g avoine · banane · 250ml lait · miel · gingembre", kcal:832, prot:38},
    V2:{d:"Overnight oats : avoine, lait, yaourt, miel, banane, gingembre", kcal:678, prot:23},
    V3:{d:"Galettes avoine-banane-œuf (batch dimanche)", kcal:759, prot:33}
  }},
  shaker: {label:'Shaker (siroté pendant le stage)', options:{
    V1:{d:"400ml lait entier · whey 35g · beurre de cacahuète 20g · banane", kcal:588, prot:47},
    V2:{d:"450ml lben · whey 35g · miel · avoine 40g", kcal:533, prot:48},
    V3:{d:"350ml lait · whey 35g · dattes · gingembre", kcal:467, prot:40}
  }},
  snack: {label:'Collation pré-training', options:{
    V1:{d:"Dattes 50g · cacahuètes 25g · graines tournesol 20g · pomme", kcal:475, prot:12},
    V2:{d:"Dattes 45g · amandes 20g · graines tournesol 20g · orange", kcal:428, prot:12},
    V3:{d:"Fromage 34g · pain complet 50g · graines tournesol 20g · pomme", kcal:415, prot:13}
  }}
};

const WEEKMEALS = {
  1:{dej:985, diner:703, prot:96, note:"Riz + poulet (S1) + légumes  ·  soir : Lentilles + pain + œuf dur + légumes"},
  2:{dej:715, diner:703, prot:108, note:"Pommes de terre + poulet (S1) + légumes  ·  soir : Lentilles + pain + œuf dur + légumes"},
  3:{dej:775, diner:703, prot:97, note:"Thon + pâtes + légumes  ·  soir : Lentilles + pain + œuf dur + légumes"},
  4:{dej:902, diner:714, prot:106, note:"Riz + poulet (S2) + légumes  ·  soir : Pois chiches + pain + œuf dur + légumes"},
  5:{dej:774, diner:714, prot:88, note:"Sardines fraîches + pommes de terre (S2) + légumes  ·  soir : Pois chiches + pain + œuf dur + légumes"},
  6:{dej:786, diner:714, prot:75, note:"Poulet (S2) + pommes de terre (S2) + légumes  ·  soir : Pois chiches + pain + œuf dur + légumes"},
  0:{dej:786, diner:714, prot:75, note:"Œufs + pommes de terre (S2) + légumes  ·  soir : Pois chiches + pain + œuf dur + légumes"}
};

// time ranges shifted so day starts at 04:00 (240min). Anything <240 gets +1440.
const BLOCKS = [
  {id:'b1', s:240, e:270, time:'04h00 – 04h30', title:'Réveil & Fajr', tag:'ibadat', items:[
    {id:'i1', label:"Réveil, niyya"},
    {id:'i2', label:"Tahajjud (2-4 rak'at) + du'a rizq + istighfar"},
    {id:'i3', label:"Fajr + adhkar courts après la prière"}
  ]},
  {id:'b2', s:270, e:330, time:'04h30 – 05h30', title:'Course & Wird', tag:'sport', items:[
    {id:'i4', label:"Course à pied ~25-30 min (cardio du surplus calorique)", tag:'sport'},
    {id:'i5', label:"Wird / lecture Coran (le temps restant)", tag:'ibadat'}
  ]},
  {id:'b3', s:330, e:435, time:'05h30 – 07h15', title:'2e bloc de sommeil', tag:'sommeil', items:[
    {id:'i6', label:"Dodo — téléphone en mode avion (cycle complet 1h45)"}
  ]},
  {id:'b4', s:435, e:465, time:'07h15 – 07h45', title:'Petit-déjeuner', tag:'nutrition', items:[
    {id:'i7', label:"Repas du matin", variant:'breakfast'},
    {id:'i8', label:"Adhkar sabah (si pas terminé avant)", tag:'ibadat'}
  ]},
  {id:'b5', s:465, e:540, time:'07h45 – 09h00', title:'Préparation & trajet', tag:'etude', items:[
    {id:'i9', label:"Se préparer, sac stage"},
    {id:'i10', label:"Trajet — Coran / dhikr audio", tag:'ibadat'},
    {id:'i11', label:"Doha (2 rak'at) en arrivant, si le temps le permet", tag:'ibadat'}
  ]},
  {id:'b6', s:540, e:780, time:'09h00 – 13h00', title:'Stage — matinée', tag:'travail', items:[
    {id:'i12', label:"Shaker sirotée pendant le stage", variant:'shaker'},
    {id:'i13', label:"Tâches CMRPI du jour"}
  ]},
  {id:'b7', s:780, e:840, time:'13h00 – 14h00', title:'Déjeuner & Dohr', tag:'nutrition', items:[
    {id:'i14', label:"__DOHR__", tag:'ibadat'},
    {id:'i15', label:"__DEJ__"}
  ]},
  {id:'b8', s:840, e:1050, time:'14h00 – 17h30', title:'Stage — après-midi', tag:'travail', items:[
    {id:'i16', label:"Asr (pause ~10 min)", tag:'ibadat'},
    {id:'i17', label:"Suite des tâches"}
  ]},
  {id:'b9', s:1050, e:1080, time:'17h30 – 18h00', title:'Trajet retour & collation', tag:'nutrition', items:[
    {id:'i18', label:"Collation pré-training", variant:'snack'}
  ]},
  {id:'b10', s:1080, e:1170, time:'18h00 – 19h30', title:'Musculation', tag:'sport', items:[
    {id:'i19', label:"__WORKOUT__"},
    {id:'i20', label:"Progression : borne haute sur toutes les séries → +2,5kg la prochaine fois"}
  ]},
  {id:'b11', s:1170, e:1200, time:'19h30 – 20h00', title:'Douche', tag:'sommeil', items:[
    {id:'i21', label:"Douche, retour au calme"}
  ]},
  {id:'b12', s:1200, e:1230, time:'20h00 – 20h30', title:'Dîner & Maghreb', tag:'nutrition', items:[
    {id:'i22', label:"Maghreb + sonna", tag:'ibadat'},
    {id:'i23', label:"__DINER__"}
  ]},
  {id:'b13', s:1230, e:1320, time:'20h30 – 22h00', title:"Étude, Icha & Qiyam", tag:'etude', items:[
    {id:'i24', label:"Icha + adhkar massa", tag:'ibadat'},
    {id:'i25', label:"Étude / khedma (PFA, cours)"},
    {id:'i26', label:"Qiyam layl ~30min", tag:'ibadat'},
    {id:'i27', label:"Journal + silat rahim", tag:'ibadat'}
  ]},
  {id:'b14', s:1320, e:1680, time:'22h00', title:'Coucher', tag:'sommeil', items:[
    {id:'i28', label:"Écrans éteints, dodo (cycle 22h–04h)"}
  ]}
];
const TOTAL_ITEMS = BLOCKS.reduce((a,b)=>a+b.items.length,0);

function todayKey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function shiftedMins(d){
  let m = d.getHours()*60+d.getMinutes();
  if(m<240) m+=1440;
  return m;
}
function dayOfWeek(d){ return d.getDay(); } // 0 sun ... 6 sat

let state = { checked:{}, variants:{breakfast:'V1', shaker:'V1', snack:'V1'} };
let history = {}; // dateKey -> {checked:{...}}

async function loadToday(){
  const key = 'checklist:'+todayKey(new Date());
  try{
    const r = await window.storage.get(key, false);
    if(r && r.value){ state = JSON.parse(r.value); }
  }catch(e){ /* no entry yet, keep defaults */ }
}
async function saveToday(){
  const key = 'checklist:'+todayKey(new Date());
  try{ await window.storage.set(key, JSON.stringify(state), false); }catch(e){ console.error('save failed', e); }
}
async function loadHistory(){
  try{
    const list = await window.storage.list('checklist:', false);
    if(!list || !list.keys) return;
    const keys = list.keys.slice(-8);
    for(const k of keys){
      try{
        const r = await window.storage.get(k, false);
        if(r && r.value){
          const dateKey = k.replace('checklist:','');
          history[dateKey] = JSON.parse(r.value);
        }
      }catch(e){}
    }
  }catch(e){ /* no keys yet */ }
}

function render(){
  const now = new Date();
  const nowMins = shiftedMins(now);
  const dow = dayOfWeek(now);
  const workout = WORKOUTS[dow];
  const meals = WEEKMEALS[dow];
  const dayNames = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const isFriday = dow === 5;

  let currentBlock = BLOCKS.find(b => nowMins >= b.s && nowMins < b.e);
  if(!currentBlock) currentBlock = BLOCKS[BLOCKS.length-1];

  // progress
  let doneCount = 0;
  BLOCKS.forEach(b=>b.items.forEach(it=>{ if(state.checked[it.id]) doneCount++; }));
  const pct = Math.round((doneCount/TOTAL_ITEMS)*100);

  // spine dot position
  const spineTopPad = 20, spineBottomPad = 40;
  const totalSpan = 1680-240;
  const dotFrac = Math.min(Math.max((nowMins-240)/totalSpan,0),1);

  let html = '';
  html += `<div class="header">
    <div class="eyebrow">Routine · ${dayNames[dow]} ${now.getDate()}/${now.getMonth()+1}</div>
    <h1>Ma journée type</h1>
    <div class="subline">Un seul planning, tous les jours — le contenu du sport et des repas s'adapte automatiquement au jour.</div>
    <div class="badges">
      <span class="badge workout">🏋 ${workout.name}</span>
      <span class="badge">🌙 Fajr ~04h30 (été) — vérifie l'horaire exact du jour</span>
      ${isFriday ? '<span class="badge">🕌 Vendredi — Jumu&#39;a</span>' : ''}
    </div>
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-label">Avancement aujourd'hui</span>
        <span class="progress-count">${doneCount}/${TOTAL_ITEMS} · ${pct}%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
      ${renderHistory()}
    </div>
  </div>`;

  html += `<div class="timeline">
    <div class="spine"></div>
    <div class="now-dot" style="top:${spineTopPad + dotFrac*(0)}px"></div>`;
  // we'll position dot precisely after render via JS (percentage of container height) — placeholder, fixed below

  BLOCKS.forEach(b=>{
    const isCurrent = b.id===currentBlock.id;
    html += `<div class="block ${isCurrent?'current':''}" data-block="${b.id}">
      <div class="block-head">
        <div>
          <div class="block-time">${b.time}</div>
          <div class="block-title">${b.title}</div>
        </div>
        ${isCurrent ? '<span class="now-pill">maintenant</span>' : ''}
      </div>`;
    b.items.forEach(it=>{
      let label = it.label;
      let extraNote = '';
      let variantBlock = '';
      if(label==='__DOHR__'){ label = isFriday ? "Jumu'a (khutba + prière)" : "Sonna + Dohr + sonna"; }
      if(label==='__DEJ__'){
        label = "Déjeuner (pause stage)";
        extraNote = `<div class="meta-note">~${meals.dej} kcal · ${meals.note}</div>`;
      }
      if(label==='__DINER__'){
        label = "Dîner";
        extraNote = `<div class="meta-note">~${meals.diner} kcal · ${meals.prot}g prot (total jour)</div>`;
      }
      if(label==='__WORKOUT__'){
        label = `Séance : ${workout.name}`;
        extraNote = `<div class="meta-note">${workout.detail}</div>`;
      }
      const checked = !!state.checked[it.id];
      const tagHtml = it.tag ? `<span class="tag" style="background:${TAGCOLOR[it.tag]}">${TAGLABEL[it.tag]}</span>` : `<span class="tag" style="background:${TAGCOLOR[b.tag]}">${TAGLABEL[b.tag]}</span>`;
      html += `<div class="item ${checked?'done':''}">
        <input type="checkbox" id="chk-${it.id}" data-item="${it.id}" ${checked?'checked':''}/>
        <label for="chk-${it.id}">${label}${tagHtml}</label>
      </div>${extraNote}`;
      if(it.variant){
        const md = MEALDATA[it.variant];
        const chosen = state.variants[it.variant] || 'V1';
        const opt = md.options[chosen];
        variantBlock = `<div class="variant-row">` +
          Object.keys(md.options).map(v=>`<button class="vbtn ${v===chosen?'active':''}" data-variant-group="${it.variant}" data-variant-val="${v}">${v}</button>`).join('') +
          `</div><div class="meta-note">${opt.d} — ~${opt.kcal} kcal · ${opt.prot}g prot</div>`;
        html += variantBlock;
      }
    });
    html += `</div>`;
  });
  html += `</div>`;

  html += `<div class="footer">
    <div class="legend">
      ${Object.keys(TAGLABEL).map(k=>`<span class="chip" style="background:${TAGCOLOR[k]}">${TAGLABEL[k]}</span>`).join('')}
    </div>
    <div class="note">Les horaires de Dohr / Asr / Maghreb / Icha changent chaque jour et selon la saison — cale ces blocs sur l'horaire réel de la semaine (appli mosquée / moqawim). Le bloc Fajr est calé sur l'horaire d'été actuel (~04h30) ; ajuste-le en hiver.</div>
    <button class="reset-btn" id="resetBtn">Réinitialiser aujourd'hui</button>
  </div>`;

  document.getElementById('app').innerHTML = html;

  // position now-dot precisely relative to timeline container
  const timelineEl = document.querySelector('.timeline');
  const spineEl = document.querySelector('.spine');
  if(timelineEl && spineEl){
    const spineHeight = timelineEl.offsetHeight - spineTopPad - spineBottomPad;
    const dotTop = spineTopPad + dotFrac*spineHeight;
    document.querySelector('.now-dot').style.top = dotTop+'px';
  }

  // wire events
  document.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change', async (e)=>{
      const id = e.target.getAttribute('data-item');
      state.checked[id] = e.target.checked;
      await saveToday();
      render();
    });
  });
  document.querySelectorAll('.vbtn').forEach(btn=>{
    btn.addEventListener('click', async (e)=>{
      const g = btn.getAttribute('data-variant-group');
      const v = btn.getAttribute('data-variant-val');
      state.variants[g] = v;
      await saveToday();
      render();
    });
  });
  const resetBtn = document.getElementById('resetBtn');
  if(resetBtn){
    resetBtn.addEventListener('click', async ()=>{
      state = {checked:{}, variants:{breakfast:'V1', shaker:'V1', snack:'V1'}};
      await saveToday();
      render();
    });
  }
}

function renderHistory(){
  const days = [];
  const now = new Date();
  for(let i=6;i>=0;i--){
    const d = new Date(now);
    d.setDate(d.getDate()-i);
    const key = todayKey(d);
    days.push({key, label: ['D','L','M','M','J','V','S'][d.getDay()]});
  }
  let html = '<div class="history">';
  days.forEach(day=>{
    const rec = day.key===todayKey(now) ? state : history[day.key];
    let pct = 0;
    if(rec && rec.checked){
      let c=0;
      BLOCKS.forEach(b=>b.items.forEach(it=>{ if(rec.checked[it.id]) c++; }));
      pct = Math.round((c/TOTAL_ITEMS)*100);
    }
    html += `<div><div class="day"><div class="fill" style="height:${pct}%"></div></div><div class="lbl">${day.label}</div></div>`;
  });
  html += '</div>';
  return html;
}

async function init(){
  await loadToday();
  await loadHistory();
  render();
  setInterval(render, 60000);
}
init();

})();
</script>
